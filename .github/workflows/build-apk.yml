name: Build & Release APK

on:
  push:
    branches: [main]
    paths:
      - "android_app/**"      # solo si cambia la app
  workflow_dispatch:           # también se puede disparar manualmente

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── System deps requeridos por Buildozer ──────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            build-essential libffi-dev libssl-dev \
            libltdl-dev libjpeg-dev zlib1g-dev \
            autoconf libtool pkg-config cmake \
            ccache

      # ── Cache: Buildozer home (SDK/NDK) ───────────────────────────────────
      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('android_app/buildozer.spec') }}
          restore-keys: buildozer-

      # ── Cache: CCache para acelerar compilación C ─────────────────────────
      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ github.sha }}
          restore-keys: ccache-

      # ── Buildozer ─────────────────────────────────────────────────────────
      - name: Install Buildozer + Cython
        run: pip install --upgrade buildozer cython

      # ── Leer versión ──────────────────────────────────────────────────────
      - name: Read app version
        id: ver
        run: |
          VERSION=$(python -c "
          import sys; sys.path.insert(0, 'android_app')
          from version import VERSION; print(VERSION)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: $VERSION"

      # ── Compilar APK ──────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android_app
        env:
          CCACHE_DIR: ~/.ccache
        run: |
          buildozer android debug 2>&1 | tail -50

      # ── Renombrar APK con versión ─────────────────────────────────────────
      - name: Rename APK
        run: |
          APK=$(ls android_app/bin/*.apk | head -1)
          cp "$APK" "refractory-capture-v${{ steps.ver.outputs.version }}.apk"
          echo "APK: refractory-capture-v${{ steps.ver.outputs.version }}.apk"

      # ── Publicar Release en GitHub ────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: "Refractory Capture v${{ steps.ver.outputs.version }}"
          body: |
            ## Cambios
            Commit: ${{ github.sha }}

            ### Instalación
            1. Descargá el APK
            2. Habilitá *Instalar apps desconocidas* para tu navegador/gestor de archivos
            3. Abrí el APK e instalá

            > Si ya tenés la app instalada, se actualizará automáticamente al abrir la app.
          files: refractory-capture-v${{ steps.ver.outputs.version }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
