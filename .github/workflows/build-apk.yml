name: Build & Release APK

on:
  push:
    branches: [main]
    paths:
      - "android_app/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── System deps ───────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip curl wget \
            openjdk-17-jdk \
            build-essential \
            libffi-dev libssl-dev libncurses5-dev \
            libsqlite3-dev libreadline-dev libbz2-dev \
            libltdl-dev libjpeg-dev libpng-dev \
            zlib1g-dev autoconf libtool pkg-config cmake \
            ccache lld

      # ── Cache Buildozer (SDK/NDK — ~3 GB, tarda 15 min sin cache) ────────
      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v2-${{ hashFiles('android_app/buildozer.spec') }}
          restore-keys: |
            buildozer-v2-

      - name: Cache CCache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ github.sha }}
          restore-keys: ccache-

      # ── Python build tools ────────────────────────────────────────────────
      - name: Install Buildozer + Cython
        run: |
          pip install --upgrade pip
          pip install --upgrade buildozer cython virtualenv

      # ── Leer versión ──────────────────────────────────────────────────────
      - name: Read app version
        id: ver
        run: |
          VERSION=$(python android_app/version.py 2>/dev/null || \
                    python -c "exec(open('android_app/version.py').read()); print(VERSION)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      # ── Compilar APK (pipefail para detectar errores de buildozer) ────────
      - name: Build debug APK
        working-directory: android_app
        env:
          CCACHE_DIR: ~/.ccache
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee /tmp/buildozer.log
          echo "Exit code: $?"

      # ── Mostrar log si falló ──────────────────────────────────────────────
      - name: Show buildozer log on failure
        if: failure()
        run: |
          echo "=== Last 100 lines of buildozer log ==="
          tail -100 /tmp/buildozer.log || true
          echo "=== APK search ==="
          find android_app -name "*.apk" 2>/dev/null || echo "No APKs found"

      # ── Renombrar APK ─────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          APK=$(find android_app/bin -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found in android_app/bin/"
            ls -la android_app/bin/ || echo "bin/ does not exist"
            exit 1
          fi
          echo "Found APK: $APK"
          DEST="refractory-capture-v${{ steps.ver.outputs.version }}.apk"
          cp "$APK" "$DEST"
          echo "APK_PATH=$DEST" >> "$GITHUB_ENV"
          ls -lh "$DEST"

      # ── Publicar Release ──────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: "Refractory Capture v${{ steps.ver.outputs.version }}"
          body: |
            ## Cambios
            Commit: ${{ github.sha }}

            ### Cómo instalar
            1. Descargá el `.apk`
            2. En el celular: Configuración → Seguridad → activar *Instalar apps desconocidas*
            3. Abrí el APK e instalá

            > Si ya tenés la app instalada, se actualizará automáticamente al abrir la app.
          files: ${{ env.APK_PATH }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
